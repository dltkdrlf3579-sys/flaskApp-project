; =============================================================================
; config.ini
; =============================================================================
; 이 파일은 포털의 실행 방식, DB 연결, 마스터 동기화, 권한, SSO, AI 도우미,
; 협력사 출입정보 조회 컬럼 매핑을 제어한다.
;
; 주의사항:
; - SQL 쿼리는 여러 줄 값으로 읽힌다. 쿼리 본문 중간에 주석을 넣지 않는다.
; - 운영 환경에서는 DB 주소, SSO 값, 인증서 경로, 쿼리를 운영 환경에 맞게 별도 수정한다.
; - 개발 PC에서는 가짜/샘플 데이터와 mock 설정이 들어갈 수 있다.
; =============================================================================

[DEFAULT]
; Flask 디버그 모드. True면 개발 편의 기능과 상세 오류가 켜질 수 있으므로 운영은 False 권장.
debug = False
; Flask 세션 서명에 쓰는 키. 운영에서는 예측 불가능한 긴 값으로 바꿔야 한다.
secret_key = ff
; 첨부파일 저장 기본 폴더. 상대경로면 프로젝트 루트 기준으로 사용된다.
upload_folder = uploads
; 과거 비밀번호 기반 수정 기능에서 쓰던 값. 권한 기반 전환 후에는 사용 범위를 줄이는 것이 좋다.
edit_password = 12
; 관리자 페이지 진입용 비밀번호. 권한 부여 화면 등 일부 관리자 기능 접근에 사용된다.
admin_password = 12

[DATABASE]
; 과거 SQLite 시절 경로. 현재 PostgreSQL 런타임에서는 원칙적으로 사용하지 않는 legacy 값이다.
local_db_path = portal.db
; 로컬/팀 DB 백엔드. 현재 목표는 postgres 고정이다.
db_backend = postgres
; 포털 전용 PostgreSQL 연결 문자열. 운영/개발 환경마다 반드시 맞게 수정해야 한다.
postgres_dsn = postgresql://postgres:admin123@localhost:5432/portal_dev
; IQADB/사내 공용 DB 모듈 경로. MASTER_DATA_QUERIES 실행에 필요한 외부 모듈 위치다.
iqadb_module_path = C:/Users/user/AppData/Local/aipforge/pkgs/dist/obf/PY310
; IQADB 모듈 기본 경로 fallback. iqadb_module_path와 같은 역할의 예비 경로다.
default_module_path = C:/Users/user/AppData/Local/aipforge/pkgs/dist/obf/PY310
; 공용/IQADB 마스터 동기화 사용 여부. False면 일반 마스터 자동 동기화가 돌지 않는다.
external_db_enabled = false
; 첫 접속 시 마스터 동기화를 강제로 실행할지 여부. True면 첫 접속자가 오래 기다릴 수 있다.
initial_sync_on_first_request = false
; 일반 마스터 데이터를 매일 정해진 시간에 동기화할지 여부. 협력사/사고/건물/부서 캐시 등이 대상이다.
master_data_daily = false
; 일반 마스터 동기화 실행 기준 시각의 시(hour). 0~23 범위이며 KST 기준이다.
master_data_sync_hour = 3
; 일반 마스터 동기화 실행 기준 시각의 분(minute). 0~59 범위이며 KST 기준이다.
master_data_sync_minute = 0
; 일반 마스터 동기화 스케줄러가 실행 시각 도달 여부를 확인하는 주기(분).
master_data_sync_check_minutes = 10
; CONTENT_DATA_QUERIES 기반 게시글성 데이터의 최초 1회 동기화 여부.
content_data_once = false

[SECURITY]
; 업로드 가능한 파일 1개당 최대 크기(MB). 첨부파일 저장 시 제한으로 사용된다.
max_upload_size_mb = 10
; 업로드 허용 확장자 목록. 여기에 없는 확장자는 첨부 차단 대상이다.
allowed_extensions = pdf,doc,docx,xls,xlsx,xlsm,xlsb,ppt,pptx,csv,txt,png,jpg,jpeg,gif,bmp,tiff,zip,html,htm

[LOGGING]
; 애플리케이션 로그 레벨. DEBUG, INFO, WARNING, ERROR 등을 사용할 수 있다.
log_level = INFO
; 파일 로그 저장 경로. 상대경로면 프로젝트 루트 기준이다.
log_file = app.log
; DB 백엔드/연결 관련 로그를 남길지 여부.
log_db_backend = true

[NOTIFICATION]
; 알림 챗봇/웹훅 URL. 알림 기능을 쓰지 않으면 비워두거나 개발용 URL로 둔다.
chatbot_webhook_url = http://127.0.0.1:8000/webhook/portal-notification
; 알림 웹훅 인증 토큰. 상대 서버가 요구할 때만 사용한다.
chatbot_auth_token = 
; 알림 요청 timeout(초). 너무 길면 저장/처리 응답이 늦어질 수 있다.
chatbot_timeout = 5

[DASHBOARD]
; 메인 화면에서 보여줄 외부 대시보드 URL.
dashboard_url = https://your-dashboard.com
; 메인 대시보드 표시 여부. False면 대시보드 영역을 비활성화한다.
dashboard_enabled = True

[USAGE_DASHBOARD]
; 포털 사용량 추이 조회용 SQL. 관리자 사용량 화면에서 날짜별 count 형태로 사용한다.
portal_trend_query = SELECT CURRENT_DATE::date AS date, 0::int AS count
; 챗봇/AI 사용량 추이 조회용 SQL. 관리자 사용량 화면에서 날짜별 count 형태로 사용한다.
chatbot_trend_query = SELECT CURRENT_DATE::date AS date, 0::int AS count

[SQL_QUERIES]
; legacy/예비 SQL 섹션. 현재 핵심 마스터 쿼리는 MASTER_DATA_QUERIES/LOCAL_DATA_QUERIES를 사용한다.

[COLUMNS]
; 앱 시작 시 DB 컬럼 설정을 JSON 설정과 동기화할지 여부. True면 시작 시간이 늘 수 있다.
sync_on_startup = false

[PERMISSION]
; 권한 시스템 전체 사용 여부. False면 메뉴/페이지 권한 검사가 대부분 우회된다.
enabled = False
; 권한 판정 캐시 TTL(초). 값이 길면 권한 변경 반영이 늦고, 짧으면 DB 조회가 늘어난다.
cache_ttl = 300
; 권한 접근 로그 기록 여부. 문제 추적에는 유용하지만 로그량이 늘 수 있다.
log_access = true
; 신규/기본 사용자의 기본 역할명. 실제 권한 레벨은 메뉴별 사용자/부서 권한 테이블이 우선한다.
default_role = user
; 슈퍼관리자 역할명. 권한 UI나 내부 판정에서 관리자 구분에 사용된다.
super_admin_role = super_admin
; 모든 메뉴 권한을 우회할 슈퍼관리자 login_id 목록. 쉼표로 여러 명을 적을 수 있다.
super_admin_users = dev_user
; 권한용 사용자/부서 마스터를 매일 자동 동기화할지 여부. system_users/departments_external이 대상이다.
master_sync_daily = true
; 권한 마스터 동기화 실행 기준 시각의 시(hour). KST 기준이다.
master_sync_hour = 3
; 권한 마스터 동기화 실행 기준 시각의 분(minute). KST 기준이다.
master_sync_minute = 20
; 권한 마스터 동기화 스케줄러가 실행 시각 도달 여부를 확인하는 주기(분).
master_sync_check_minutes = 10

[MASTER_DATA_QUERIES]
; 공용/IQADB에서 협력사 기준정보를 가져오는 쿼리. 결과는 협력사 기준정보 마스터로 동기화된다.
partners_query = SELECT
	business_number,
	company_name,
	partner_class,
	business_type_major,
	business_type_minor,
	hazard_work_flag,
	representative,
	address,
	average_age,
	annual_revenue,
	transaction_count,
	permanent_workers
	FROM partners
	ORDER BY company_name
; 공용/IQADB에서 사고 마스터를 가져오는 쿼리. 사고예방/사고 조회 기준 데이터로 사용된다.
accidents_query = SELECT
	accident_number,
	accident_name,
	workplace,
	accident_grade,
	major_category,
	injury_form,
	injury_type,
	accident_date,
	day_of_week,  
	created_at as created_at,
	building,
	floor,
	location_category,
	location_detail
	FROM accidents
	WHERE accident_number IS NOT NULL
; 공용/IQADB에서 건물 기준정보를 가져오는 쿼리. 건물 검색/팝업/마스터 동기화에 사용된다.
building_query = SELECT building_code, building_name, SITE, SITE_TYPE FROM buildings WHERE 1=1
; 공용/IQADB에서 부서 기준정보를 가져오는 쿼리. 일반 부서 캐시와 권한 부서 마스터 동기화에 사용된다.
department_query = SELECT dept_code, dept_name, parent_dept_code FROM departments WHERE 1=1
; 공용/IQADB에서 작업자/협력사 인력 기준정보를 가져오는 쿼리.
contractor_query = SELECT worker_id, worker_name, company_name, business_number FROM contractors WHERE 1=1
; 공용/IQADB에서 조직/사업부 기준정보를 가져오는 쿼리.
division_query = SELECT division_code, division_name, parent_division_code, division_level, division_manager, division_location FROM divisions WHERE 1=1 ORDER BY division_name
; 공용/IQADB에서 환경안전 지시서 데이터를 가져오는 쿼리. CONTENT_DATA_QUERIES에 같은 키가 있으면 그쪽이 우선될 수 있다.
safety_instructions_query = SELECT * FROM safety_instructions WHERE issue_number IS NOT NULL
; 공용/IQADB에서 Follow SOP 데이터를 가져오는 예비 쿼리. CONTENT_DATA_QUERIES에 같은 키가 있으면 그쪽이 우선될 수 있다.
followsop_query = SELECT * FROM 외부_followsop_테이블 WHERE 1=1
; 공용/IQADB에서 Full Process 데이터를 가져오는 예비 쿼리. CONTENT_DATA_QUERIES에 같은 키가 있으면 그쪽이 우선될 수 있다.
fullprocess_query = SELECT * FROM 외부_fullprocess_테이블 WHERE 1=1
; 공용/IQADB에서 협력사 기준정보 변경요청 데이터를 가져오는 예비 쿼리.
partner_change_requests_query = SELECT * FROM 외부_partner_change_requests_테이블 WHERE 1=1

[LOCAL_DATA_QUERIES]
; 포털 전용 PostgreSQL에서 임직원/사용자 정보를 가져오는 쿼리. 권한용 system_users 동기화에도 사용된다.
employee_query = SELECT employee_id, employee_name, department_name FROM employees WHERE 1=1

[PARTNER_ACCESS]
; 출입정보 조회 결과 화면에서 한 번에 표시할 최대 행 수. 너무 크면 조회/렌더링이 느려진다.
result_limit = 1000
; 건물/층/상세위치 팝업에서 distinct 목록을 가져올 최대 개수.
distinct_limit = 200
; 기흥 사업장 화면 표시명.
giheung_label = 기흥
; 기흥 출입 로그 조회에 사용할 뷰/테이블명.
giheung_table = vw_eventlog_gh
; 화성 사업장 화면 표시명.
hwaseong_label = 화성
; 화성 출입 로그 조회에 사용할 뷰/테이블명.
hwaseong_table = vw_eventlog_hs
; DSR 사업장 화면 표시명.
dsr_label = DSR
; DSR 출입 로그 조회에 사용할 뷰/테이블명.
dsr_table = vw_eventlog_dsr
; 평택 사업장 화면 표시명.
pyeongtaek_label = 평택
; 평택 출입 로그 조회에 사용할 뷰/테이블명.
pyeongtaek_table = vw_eventlog_pt
; 천안 사업장 화면 표시명.
cheonan_label = 천안
; 천안 출입 로그 조회에 사용할 통합 뷰/테이블명.
cheonan_table = vw_eventlogcaoy
; 천안/온양 통합 테이블에서 천안 데이터만 거르기 위한 site 필터 값.
cheonan_site_filter = 천안
; 온양 사업장 화면 표시명.
onyang_label = 온양
; 온양 출입 로그 조회에 사용할 통합 뷰/테이블명.
onyang_table = vw_eventlogcaoy
; 천안/온양 통합 테이블에서 온양 데이터만 거르기 위한 site 필터 값.
onyang_site_filter = 온양
; 출입 발생 시각 컬럼명. 운영 뷰에서는 ProcDate/RegDateTime 등을 이 별칭으로 맞춰야 한다.
event_time_column = event_time
; IN/OUT 방향 컬럼명. 재실 판정과 출입이력 표시에 사용된다.
direction_column = direction
; 사업자번호/회사코드 컬럼명. 결과표와 협력사 필터에 사용된다.
company_cd_column = company_cd
; 임직원/협력사/내방자 등 인원 구분 컬럼명.
employee_type_column = employee_type
; 카드 유형 컬럼명. 장기출입/일일내방/관계사/임직원 구분 보정에 사용된다.
card_type_column = card_type
; 사번/ID/내방ID 성격의 식별자 컬럼명. 절대 unique key로 가정하면 안 된다.
employee_no_column = employee_no
; DomainID 컬럼명. 장기출입/특정 카드 유형 보정에 사용된다.
domain_id_column = domain_id
; 협력사명/회사명 컬럼명. 결과표와 협력사명 LIKE 검색에 사용된다.
company_name_column = company_name
; 성함 컬럼명. 결과표와 성명 LIKE 검색에 사용된다.
employee_name_column = employee_name
; 사업장명 컬럼명. 천안/온양 분리 필터와 결과표에 사용된다.
site_name_column = site_name
; 건물명 컬럼명. 건물/층 팝업과 조회 조건에 사용된다.
building_name_column = building_name
; 층 컬럼명. 건물 선택 후 층 목록과 조회 조건에 사용된다.
floor_name_column = floor_name
; 상세위치 컬럼명. 상세위치 팝업/멀티선택과 조회 조건에 사용된다.
detail_location_column = detail_location
; 1선/2선/3선 등 출입 레벨 컬럼명. 결과표의 구분 정보로 사용된다.
access_level_column = access_level
; 리더기명 컬럼명. 결과표에서 실제 카드 리더 위치를 보여주는 데 사용된다.
reader_name_column = reader_name

[AI_ASSISTANT]
; AI 조회 도우미 메뉴 사용 여부. False면 기능을 숨기거나 비활성화할 수 있다.
enabled = true
; AI 도우미 동작 모드. mock은 실제 사내 API 호출 없이 데모 응답만 생성한다.
mode = mock
; 실제 사내 AI 클라이언트 모듈이 있는 폴더 경로. 사내 PC에서 import 경로로 사용한다.
real_module_path =
; 실제 사내 AI 클라이언트 모듈명. 예: internal_ai_client
real_module =
; 일반 응답 함수명. 예: ask_internal_ai
real_function =
; 스트리밍 응답 함수명. 설정하면 글자가 순차적으로 나오는 방식에 사용한다.
real_stream_function =
; mock 스트리밍 응답에서 토큰/문장 조각 사이에 둘 지연시간(ms).
mock_stream_delay_ms = 25

[AI_DOMAIN_PARTNER_ACCESS]
; AI가 인식할 도메인 표시명.
name = 협력사 출입정보
; 이 도메인의 주 대상 DB. local_postgres는 포털 전용 PostgreSQL을 의미한다.
db = local_postgres
; AI 도우미 오른쪽 도메인 카드와 의도 분류 참고용 설명.
description = 협력사 재실인원과 출입이력을 조회하는 도메인
; 사용자의 질문에서 이 도메인을 고를 때 참고할 키워드 목록.
keywords = 출입,재실,협력사,건물,층,카드,IN,OUT

[AI_DOMAIN_MASTER_DATA]
; AI가 인식할 공용 기준정보 도메인 표시명.
name = 공용 기준정보
; 이 도메인의 주 대상 DB. iqadb는 사내 공용 DB를 의미한다.
db = iqadb
; AI 도우미 오른쪽 도메인 카드와 의도 분류 참고용 설명.
description = IQADB 공용 기준정보를 조회하는 도메인
; 사용자의 질문에서 이 도메인을 고를 때 참고할 키워드 목록.
keywords = 기준정보,협력사,업체,부서,마스터

[AI_DOMAIN_SAFETY_HISTORY]
; AI가 인식할 안전교육/점검 이력 도메인 표시명.
name = 안전교육/점검 이력
; 이 도메인의 주 대상 DB. iqadb는 사내 공용 DB를 의미한다.
db = iqadb
; AI 도우미 오른쪽 도메인 카드와 의도 분류 참고용 설명.
description = 안전교육 이력과 점검 정보를 조회하는 도메인
; 사용자의 질문에서 이 도메인을 고를 때 참고할 키워드 목록.
keywords = 교육,안전교육,이수,점검,조치,검사

[CONTENT_DATA_QUERIES]
; 게시글성 환경안전 지시서 데이터를 가져오는 쿼리. MASTER_DATA_QUERIES보다 우선 사용될 수 있다.
safety_instructions_query = SELECT * FROM safety_instructions WHERE issue_number IS NOT NULL AND (is_deleted = 0 OR is_deleted IS NULL)
; 게시글성 Follow SOP 데이터를 가져오는 쿼리. 운영에서는 실제 테이블/뷰로 교체해야 한다.
followsop_query = SELECT * FROM 외부_followsop_테이블 WHERE 1=1
; 게시글성 Full Process 데이터를 가져오는 쿼리. 운영에서는 실제 테이블/뷰로 교체해야 한다.
fullprocess_query = SELECT * FROM 외부_fullprocess_테이블 WHERE 1=1
; 게시글성 협력사 기준정보 변경요청 데이터를 가져오는 쿼리. 운영에서는 실제 테이블/뷰로 교체해야 한다.
partner_change_requests_query = SELECT * FROM 외부_partner_change_requests_테이블 WHERE 1=1

[SCORING_MAPPING_SAFETY]
; 안전 점수 계산에서 헬멧 위반 수를 어느 item 컬럼에 매핑할지 지정한다.
