[SSO]
; SSO 인증 사용 여부. False면 SSO 시작 자체를 끌 수 있다.
sso_enabled = False
; 사내 IdP 인증 URL 또는 entity 값. /SSO 진입 시 인증 요청을 만들 때 사용된다.
idp_entity_id = example
; 로그아웃 후 이동할 IdP/포털 URL.
idp_signout_url = http://127.0.0.1:5000/
; SSO 클라이언트 ID. 사내 IdP에 등록된 서비스 식별자다.
idp_client_id = example
; IdP가 인증 결과를 돌려줄 ACS/redirect URL. 운영 도메인과 정확히 일치해야 한다.
sp_redirect_url = https://example.com/acs
; IdP 인증서 폴더 경로. 상대경로면 프로젝트 루트 기준으로 보정된다.
cert_file_path = Templates/Cert/
; IdP 인증서 파일명.
cert_file_name = Idp.cer
; Flask 직접 실행 시 HTTPS 인증서 파일 경로.
ssl_cert_file = Templates/Cert/cert.pem
; Flask 직접 실행 시 HTTPS 개인키 파일 경로.
ssl_key_file = Templates/Cert/key.pem
; HTTPS 실행 포트. waitress 사용 시에는 별도 실행 명령의 포트가 우선될 수 있다.
ssl_port = 44369
; HTTP 실행 포트. 개발 PC에서 `python -m flask run` 시 기본적으로 5000을 많이 쓴다.
http_port = 5000
; 개발용 SSO 우회/시뮬레이션 모드. 운영에서는 False 권장.
dev_mode = True
; 개발용 로그인 사용자 ID. dev_mode/dev_simulate_flow에서 세션 user_id로 사용된다.
dev_user_id = dev_user
; 개발용 로그인 사용자명.
dev_user_name = 개발자
; 개발용 부서명 또는 부서 ID 대체값. 권한 테스트 시 실제 부서 구조와 다를 수 있다.
dev_department = 개발팀
; 개발용 직급 표시값.
dev_grade = 과장
; 세션이 없을 때 개발용 로그인 흐름을 자동 시뮬레이션할지 여부.
dev_simulate_flow = False
; 자동 SSO 미들웨어 사용 여부. True면 세션이 없는 일반 페이지 접근 시 /SSO로 보낸다.
enabled = true
; LDAP 서버 주소. 현재 핵심 SSO 흐름과 별도로 legacy/예비 설정일 수 있다.
ldap_server = ldap://localhost:389
; LDAP 검색 base DN. LDAP 연동을 사용할 때만 의미가 있다.
ldap_base_dn = dc=company,dc=com
; 사용자 정보 API URL. SSO/사용자 보강 연동에서 사용할 수 있는 예비 설정이다.
api_url = http://localhost:8080/api/users

[APPLICATION]
; Flask 앱 바인딩 호스트. 0.0.0.0은 모든 네트워크 인터페이스에서 수신한다.
host = 0.0.0.0
; Flask 앱 기본 포트. 실제 실행 명령이나 waitress 설정이 있으면 그 값이 우선될 수 있다.
port = 5000

[REDIS]
; Redis 서버 주소. 캐시/세션 등에 Redis를 붙일 때 사용한다.
host = localhost
; Redis 서버 포트.
port = 6379
; Redis DB 번호.
db = 0
; Redis 사용 여부. False면 Redis 없이 동작하는 경로를 사용한다.
enabled = false
